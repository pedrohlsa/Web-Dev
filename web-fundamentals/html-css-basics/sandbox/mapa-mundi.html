<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio do Mapa Mundi</title>
    <style>
        body { display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .linha { display: flex; flex-direction: row; }
        img { width: 250px; }
    </style>
</head>
<body>
    <h1>Desafio do Mapa!</h1>
    <h2>Agora é hora de treinar um pouco de uso de imagens, parágrafos e quebras de linha!</h2>
    <div class="linha">
        <img src="imagemapamundi/mapa01.png" alt="mapa 01">
        <img src="imagemapamundi/mapa02.png" alt="mapa 02">
        <img src="imagemapamundi/mapa03.png" alt="mapa 03">
    </div>
    <div class="linha">
        <img src="imagemapamundi/mapa04.png" alt="mapa 04">
        <img src="imagemapamundi/mapa05.png" alt="mapa 05">
        <img src="imagemapamundi/mapa06.png" alt="mapa 06">
    </div>
    <div class="linha">
        <img src="imagemapamundi/mapa07.png" alt="mapa 07">
        <img src="imagemapamundi/mapa08.png" alt="mapa 08">
        <img src="imagemapamundi/mapa09.png" alt="mapa 09">
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias</title>
</head>
<body>
    <h1>Áudio em HTML5</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <audio preload="metadata" controls loop>    
        <source src="flexibemedias/Tonight Again - Rod Kim (feat. Mostly Moss).mp3" type="audio/mpeg">
        <source src="flexibemedias/Tonight Again - Rod Kim (feat. Mostly Moss).ogg" type="audio/ogg">
        <source src="flexibemedias/Tonight Again - Rod Kim (feat. Mostly Moss).wav" type="audio/wav">    
        <p>Infelizmente, seu navegador não suporta a reprodução de áudios. 
        <a href="flexibemedias/Tonight Again - Rod Kim (feat. Mostly Moss).mp3">
        Clique aqui para baixar o arquivo</a></p>    
    </audio>
    
    <h1>Vídeos em HTML</h1>
    <p>Este vídeo está hospedado no meu servidor</p>

    <video poster="flexibemedias/limao.jpg" controls width="400" height="400">
        <source src="flexibemedias/testeveryfast.mp4" type="video/mp4">
        <source src="flexibemedias/testeveryfast.webm" type="video/webm">
        
        <p>Seu navegador não suporta a reprodução deste vídeo.</p>
    </video>
</body>
</html>

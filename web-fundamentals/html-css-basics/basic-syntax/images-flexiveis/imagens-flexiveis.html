<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Dinâmica</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir este site em dispositivos diferentes, ou simplesmente aumente e diminua a janela do navegador.</p>
    
    <picture>
        <source media="(min-width: 1000px)" srcset="flexibemedias/bigimg.png" type="image/png">
        
        <source media="(min-width: 750px)" srcset="flexibemedias/mediumimg.png" type="image/png">
        
        <img src="flexibemedias/smallimg.png" alt="Imagem Flexível">
    </picture>
</body>
</html>

<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Forum - Cadastro</title>
        <style>
            body {
                background-color: linen;
                font-family: sans-serif;
            }
            fieldset {
                margin: 20px auto;
                max-width: 600px;
                display: block;
                text-align: center;
                color: red;
                border-radius: 30px;
                font-size: 20px;
                padding: 20px;
            }
            label {
                margin-top: 15px;
                font-size: 15px;
                color: black;
                font-weight: bold;
                display: block;
            }
            input {
                margin-top: 5px;
                font-size: 17px;
                width: 300px;
                padding: 5px;
            }
            select {
                font-size: 15px;
                width: 120px;
                margin-top: 10px;
                cursor: pointer;
            }
            textarea {
                margin-top: 10px;
                font-size: 15px;
                padding: 10px;
            }
            button {
                padding: 15px 30px;
                margin: 20px 10px;
                font-weight: bold;
                font-size: 15px;
                border-radius: 8px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <form action="back.php" method="post">
            <fieldset>
                <legend>Cadastro</legend>

                <label for="user">Usuário:</label>
                <input
                    type="text"
                    minlength="2"
                    id="user"
                    name="user"
                    required
                />

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required />

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required />

                <label for="confirmarpassword">Confirme sua Senha:</label>
                <input
                    type="password"
                    id="confirmarpassword"
                    name="confirmarpassword"
                    required
                />

                <label for="invite">Invite Code:</label>
                <input type="text" id="invite" name="invite" />

                <label for="genero">Gênero:</label>
                <select id="genero" name="genero">
                    <option value="Homem">Homem</option>
                    <option value="Mulher">Mulher</option>
                    <option value="Outro">Outro</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Sobre</legend>
                <label for="justify"
                    >Motivo do porquê devemos te aceitar:</label
                >
                <textarea
                    id="justify"
                    name="justify"
                    rows="8"
                    cols="50"
                ></textarea>
                <br />
                <button type="submit">Enviar Form!</button>
                <button type="reset">Resetar Form!</button>
            </fieldset>
        </form>
    </body>
</html>
